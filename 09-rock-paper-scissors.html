<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <h1>Rock Paper Scissors</h1>

    <button onclick="playGame('rock');">Rock</button>
    <button onclick="playGame('paper');">Paper</button>
    <button onclick="playGame('scissors');">Scissors</button>
    <p class="js-result"></p>
    <p class="js-score"></p>

    <p class="js-moves"></p>
    <button onclick="resetScores(); updateScoreElement();">Reset Scores</button>

    <script>
      let scores = JSON.parse(localStorage.getItem("score")) || {
        Win: 0,
        Lose: 0,
        Tie: 0,
      };

      updateScoreElement();

      console.log(scores);
      function resetScores() {
        scores.Win = 0;
        scores.Lose = 0;
        scores.Tie = 0;
        localStorage.removeItem("score");
      }
      function playGame(playerMove) {
        const computerMove = pickComputerMove();
        let announcement = "";
        if (playerMove === computerMove) {
          announcement = "Tie.";
        } else if (playerMove === "rock") {
          if (computerMove === "paper") {
            announcement = "You lose.";
          } else {
            announcement = "You win.";
          }
        } else if (playerMove === "paper") {
          if (computerMove === "rock") {
            announcement = "You win.";
          } else {
            announcement = "You lose.";
          }
        } else {
          if (computerMove === "rock") {
            announcement = "You lose.";
          } else if (computerMove === "paper") {
            announcement = "You win.";
          }
        }

        if (announcement === "You win.") {
          scores.Win += 1;
        } else if (announcement === "You lose.") {
          scores.Lose += 1;
        } else {
          scores.Tie += 1;
        }

        localStorage.setItem("score", JSON.stringify(scores));

        updateScoreElement();
        document.querySelector(".js-result").innerHTML = announcement;

        document.querySelector(
          ".js-moves"
        ).innerHTML = `You picked ${playerMove}. Computer picked ${computerMove}.`;
      }
      function pickComputerMove() {
        let computerMove;
        const randomNumber = Math.random();

        if (randomNumber < 1 / 3) {
          computerMove = "rock";
        } else if (randomNumber < 2 / 3) {
          computerMove = "paper";
        } else {
          computerMove = "scissors";
        }
        return computerMove;
      }
      function updateScoreElement() {
        document.querySelector(".js-score").innerHTML = `
      Scores: Wins: ${scores.Win}, Losses: ${scores.Lose}, Ties: ${scores.Tie}.`;
      }
    </script>
  </body>
</html>
