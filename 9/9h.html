<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <input type="text" class="js-input" onkeyup="showTheData()" />
    <p class="result"></p>
  </body>
  <script>
    showTheData = () => {
      const inputElement = document.querySelector(".js-input");
      document.querySelector(".result").innerHTML = inputElement.value;
    };
  </script>
</html>
