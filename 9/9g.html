<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM Projects</title>
  </head>
  <body>
    <p>YouTube Subscribe Button</p>
    <button class="js-subscribe-button" onclick="changeTheSubscribeBtn()">
      Subscribe
    </button>

    <p>Amazon Shipping Calculator</p>
    <input
      class="js-cost-input"
      placeholder="Cost of order"
      onkeydown="event.key === 'Enter' && calculateTotal()"
    />
    <button class="cal" onclick="calculateTotal()">Calculate</button>
    <p class="js-total"></p>

    <script>
      changeTheSubscribeBtn = () => {
        const btn = document.querySelector(".js-subscribe-button");
        if (btn.innerText === "Subscribe") {
          btn.innerText = "Subscribed";
        } else {
          btn.innerText = "Subscribe";
        }
      };

      calculateTotal = () => {
        const inputElement = document.querySelector(".js-cost-input");
        let cost = Number(inputElement.value);

        if (cost < 40) {
          tmp = cost * 100;

          cost = (tmp + 1000) / 100;
        }
        document.querySelector(".js-total").innerText = `$${cost}`;
      };
    </script>
  </body>
</html>
