<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles/12-rock-paper-scissors.css" />
  </head>
  <body>
    <p class="title">Rock Paper Scissors</p>

    <button class="move-button js-rock-btn">
      <img class="move-icon" src="../images/rock-emoji.png" />
    </button>
    <button onclick="playGame('paper')" class="move-button js-paper-btn">
      <img class="move-icon" src="../images/paper-emoji.png" />
    </button>
    <button onclick="playGame('scissors')" class="move-button js-scissors-btn">
      <img class="move-icon" src="../images/scissors-emoji.png" />
    </button>

    <p class="js-result result">You Win.</p>

    <p class="js-moves">
      You
      <img src="../images/rock-emoji.png" class="move-icon" />
      <img src="../images/paper-emoji.png" class="move-icon" />
      Computer
    </p>
    <p class="js-score score"></p>
    <button
      onclick="
        resetScores();
        updateScoreElement();
      "
      class="reset-score-button"
    >
      Reset Score
    </button>

    <button class="auto-play-btn" onclick="autoPlay()">Auto Play</button>

    <script src="scripts/12-rock-paper-scissors.js"></script>
  </body>
</html>
