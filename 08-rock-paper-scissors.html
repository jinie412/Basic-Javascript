<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <h1>Rock Paper Scissors</h1>
    <button onclick="showTheResult('rock')">Rock</button>
    <button onclick="showTheResult('paper')">Paper</button>
    <button onclick="showTheResult('scissors')">Scissors</button>
    <button
      onclick="
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;
        localStorage.removeItem('score');
      "
    >
      Reset Score
    </button>
  </body>

  <script>
    let user = "";

    let move = Math.random();
    let result = "";
    // const score = {
    //   ties: 0,
    //   wins: 0,
    //   losses: 0,
    // };
    let score = JSON.parse(localStorage.getItem("score")) || {
      ties: 0,
      wins: 0,
      losses: 0,
    };
    // if (!score) {
    //   //score === null
    //   score = {
    //     ties: 0,
    //     wins: 0,
    //     losses: 0,
    //   };
    // }
    moveOfComputer = () => {
      let computer = "";
      if (move >= 0 && move < 1 / 3) {
        computer = "rock";
      } else if (move >= 1 / 3 && move < 2 / 3) {
        computer = "paper";
      } else {
        computer = "scissors";
      }
      return computer;
    };

    showTheResult = (user) => {
      let computer = moveOfComputer();
      if (user === computer) {
        result = "Tie";
      } else if (user === "rock") {
        if (computer === "paper") {
          result = "You lose";
        } else {
          result = "You win";
        }
      } else if (user === "paper") {
        if (computer === "scissors") {
          result = "You lose";
        } else {
          result = "You win";
        }
      } else {
        if (computer === "rock") {
          result = "You lose";
        } else {
          result = "You win";
        }
      }

      updateTheScore();
      localStorage.setItem("score", JSON.stringify(score));
      alert(
        `You picked ${user}. Computer picked ${computer}. ${result}.
Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`,
      );
    };

    updateTheScore = () => {
      if (result === "Tie") {
        score.ties += 1;
      } else if (result === "You win") {
        score.wins += 1;
      } else {
        score.losses += 1;
      }
    };
  </script>
</html>
