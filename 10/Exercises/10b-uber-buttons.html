<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      .button {
        border: none;
        font-weight: bold;
        padding: 15px 20px;
        font-size: 15px;
        border-radius: 5px;
        cursor: pointer;
        margin-right: 20px;
      }

      .request-btn {
        background-color: black;
        color: white;
      }
      .schedule-btn {
        background-color: rgb(230, 230, 230);
      }
    </style>
    <title>Uber buttons</title>
  </head>
  <body>
    <button class="button request-btn">Request now</button>
    <button class="button schedule-btn">Schedule for later</button>
  </body>
</html>
