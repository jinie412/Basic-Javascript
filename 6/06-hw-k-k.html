<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Variables Exercises</title>
  </head>
  <body>
    <h1>Cart Quantity</h1>
    <button onclick="console.log(`Cart quantity: ${quantity}`)">
      Show Quantity
    </button>
    <button
      onclick="
        if (quantity < 10 && quantity + 1 <= 10) {
          quantity++;
        } else {
          alert('The cart is full.');
        }
        showQuantity();
      "
    >
      Add to Cart
    </button>
    <button
      onclick="
        if (quantity < 10 && quantity + 2 <= 10) {
          quantity += 2;
        } else {
          alert('The cart is full.');
        }
        showQuantity();
      "
    >
      +2
    </button>
    <button
      onclick="
        if (quantity < 10 && quantity + 3 <= 10) {
          quantity += 3;
        } else {
          alert('The cart is full.');
        }
        showQuantity();
      "
    >
      +3
    </button>
    <button
      onclick="
        quantity = 0;
        console.log('Cart was reset.');
        showQuantity();
      "
    >
      Reset Cart
    </button>
    <button
      onclick="
        if (quantity > 0 && quantity - 1 >= 0) {
          quantity--;
        } else {
          alert('Not enough items in the cart.');
        }

        showQuantity();
      "
    >
      Remove from cart
    </button>
    <button
      onclick="
        if (quantity > 0 && quantity - 2 >= 0) {
          quantity -= 2;
        } else {
          alert('Not enough items in the cart.');
        }
        showQuantity();
      "
    >
      -2
    </button>
    <button
      onclick="
        if (quantity > 0 && quantity - 3 >= 0) {
          quantity -= 3;
        } else {
          alert('Not enough items in the cart.');
        }
        showQuantity();
      "
    >
      -3
    </button>
    <script>
      let quantity = 0;

      showQuantity = () => {
        console.log(`Cart quantity: ${quantity}`);
      };
    </script>
  </body>
</html>
