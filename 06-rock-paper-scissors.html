<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <h1>Rock Paper Scissors</h1>
    <button
      onclick="
        user = 'rock';
        moveOfComputer();
        showTheResult();
      "
    >
      Rock
    </button>
    <button
      onclick="
        user = 'paper';
        moveOfComputer();
        showTheResult();
      "
    >
      Paper
    </button>
    <button
      onclick="
        user = 'scissors';
        moveOfComputer();
        showTheResult();
      "
    >
      Scissors
    </button>
  </body>

  <script>
    let user = "";
    let computer = "";
    let move = Math.random();
    let result = "";

    moveOfComputer = () => {
      if (move >= 0 && move < 1 / 3) {
        computer = "rock";
      } else if (move >= 1 / 3 && move < 2 / 3) {
        computer = "paper";
      } else {
        computer = "scissors";
      }
    };

    showTheResult = () => {
      if (user == computer) {
        result = "Tie.";
      } else if (user == "rock") {
        if (computer == "paper") {
          result = "You lose.";
        } else {
          result = "You win.";
        }
      } else if (user == "paper") {
        if (computer == "scissors") {
          result = "You lose.";
        } else {
          result = "You win.";
        }
      } else {
        if (computer == "rock") {
          result = "You lose.";
        } else {
          result = "You win.";
        }
      }
      alert(`You picked ${user}. Computer picked ${computer}. ${result}`);
    };
  </script>
</html>
