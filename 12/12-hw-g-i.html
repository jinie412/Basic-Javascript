<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App</title>
  </head>
  <body>
    <button
      onclick="
        changeTheMessage(1);
        displayNotification();
      "
    >
      Add
    </button>
    <button onclick="changeTheMessage(-1)">Remove</button>
    <script>
      let messages = 2;
      let IntervalID;
      let isDisplayingNotification;

      function changeTheMessage(param) {
        messages += param;
        if (messages === 0) {
          stopNotification();
        }
        console.log(messages);
      }

      function displayNotification() {
        // If we're already displaying the notification,
        // stop this function because we don't want to
        // create 2 intervals at the same time.
        if (isDisplayingNotification) {
          return;
        }
        isDisplayingNotification = true;

        IntervalID = setInterval(function () {
          if (document.title === "App") {
            document.title = `(${messages}) New messages`;
          } else {
            document.title = "App";
          }
        }, 1000);
      }
      displayNotification();

      function stopNotification() {
        isDisplayingNotification = false;
        clearInterval(IntervalID);
        document.title = "App";
      }
    </script>
  </body>
</html>
